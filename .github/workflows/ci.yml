name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TAILWIND_VERSION: v4.3.0
  DIOXUS_CLI_VERSION: "0.7.9"
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test (cargo fmt + clippy + test)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up diag dir
        run: mkdir -p /tmp/diag

      - uses: actions-rust-lang/setup-rust-toolchain@v1.13.0
        with:
          components: rustfmt,clippy
          target: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2.7.5
        with:
          shared-key: betu-tanulas

      - name: Install Tailwind standalone CLI
        run: |
          set -o pipefail
          curl -sSL -o /usr/local/bin/tailwindcss \
            "https://github.com/tailwindlabs/tailwindcss/releases/download/${TAILWIND_VERSION}/tailwindcss-linux-x64" \
            2>&1 | tee /tmp/diag/install_tw.log
          chmod +x /usr/local/bin/tailwindcss
          tailwindcss --help >/dev/null

      - name: Build Tailwind CSS
        run: |
          set -o pipefail
          tailwindcss -i assets/tailwind.input.css -o assets/tailwind.css --minify \
            2>&1 | tee /tmp/diag/build_css.log

      - name: cargo fmt --check
        run: |
          set -o pipefail
          cargo fmt --all -- --check 2>&1 | tee /tmp/diag/fmt.log

      - name: cargo clippy
        run: |
          set -o pipefail
          cargo clippy --all-targets -- -D warnings 2>&1 | tee /tmp/diag/clippy.log

      - name: cargo test
        run: |
          set -o pipefail
          cargo test --all-targets 2>&1 | tee /tmp/diag/test.log

      - name: Post diagnostics on failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## CI \`test\` job failed (commit \`${{ github.sha }}\`)"
            echo
            for f in /tmp/diag/*.log; do
              echo "<details><summary>$(basename "$f") — last 50 KB</summary>"
              echo
              echo '```'
              tail -c 50000 "$f"
              echo '```'
              echo "</details>"
              echo
            done
          } > /tmp/diag/comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            -F /tmp/diag/comment.md

  bundle:
    name: Bundle (dx bundle --platform web)
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up diag dir
        run: mkdir -p /tmp/diag

      - uses: actions-rust-lang/setup-rust-toolchain@v1.13.0
        with:
          target: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2.7.5
        with:
          shared-key: betu-tanulas

      - uses: taiki-e/install-action@v2.49.4
        with:
          tool: dioxus-cli@${{ env.DIOXUS_CLI_VERSION }}

      - name: Install Tailwind standalone CLI
        run: |
          set -o pipefail
          curl -sSL -o /usr/local/bin/tailwindcss \
            "https://github.com/tailwindlabs/tailwindcss/releases/download/${TAILWIND_VERSION}/tailwindcss-linux-x64" \
            2>&1 | tee /tmp/diag/install_tw.log
          chmod +x /usr/local/bin/tailwindcss

      - name: Build Tailwind CSS
        run: |
          set -o pipefail
          tailwindcss -i assets/tailwind.input.css -o assets/tailwind.css --minify \
            2>&1 | tee /tmp/diag/build_css.log

      - name: dx bundle
        run: |
          set -o pipefail
          dx bundle --platform web --release 2>&1 | tee /tmp/diag/bundle.log

      # Audio assets aren't referenced through the Dioxus `asset!()` macro
      # (we want stable URLs like /audio/letter/A.wav so the runtime
      # service can build paths from a letter or word string), so the
      # bundler doesn't copy them. Do it explicitly here.
      - name: Copy audio assets into bundle
        run: |
          set -o pipefail
          mkdir -p dist/public/audio
          cp -R assets/audio/letter assets/audio/word assets/audio/sfx \
            dist/public/audio/ 2>&1 | tee /tmp/diag/copy_audio.log
          ls dist/public/audio/letter | head -3
          ls dist/public/audio/sfx

      - name: Verify bundle output
        run: |
          set -o pipefail
          test -f dist/public/index.html || { echo "missing dist/public/index.html"; exit 1; }
          test -f dist/public/audio/sfx/snap.wav || { echo "missing snap.wav"; exit 1; }
          test -f dist/public/audio/sfx/chime.wav || { echo "missing chime.wav"; exit 1; }
          test -f dist/public/audio/letter/A.wav || { echo "missing letter A.wav"; exit 1; }
          ls -la dist/public/ 2>&1 | tee /tmp/diag/bundle_verify.log

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: dist
          path: dist/public/
          retention-days: 7
          if-no-files-found: error

      - name: Post diagnostics on failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## CI \`bundle\` job failed (commit \`${{ github.sha }}\`)"
            echo
            for f in /tmp/diag/*.log; do
              echo "<details><summary>$(basename "$f") — last 50 KB</summary>"
              echo
              echo '```'
              tail -c 50000 "$f"
              echo '```'
              echo "</details>"
              echo
            done
          } > /tmp/diag/comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            -F /tmp/diag/comment.md

  e2e:
    name: E2E (Playwright, mobile viewport)
    needs: bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up diag dir
        run: mkdir -p /tmp/diag

      - name: Download dist artifact
        uses: actions/download-artifact@v4.1.8
        with:
          name: dist
          path: dist/public

      - uses: actions/setup-node@v4.0.4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      - name: Install Playwright deps
        working-directory: e2e
        run: |
          set -o pipefail
          npm ci 2>&1 | tee /tmp/diag/npm_ci.log

      - name: Cache Playwright browsers
        uses: actions/cache@v4.0.2
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.49.1

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: |
          set -o pipefail
          npx playwright install --with-deps webkit chromium \
            2>&1 | tee /tmp/diag/playwright_install.log

      - name: Install Playwright system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: e2e
        run: |
          set -o pipefail
          npx playwright install-deps webkit chromium \
            2>&1 | tee /tmp/diag/playwright_install_deps.log

      - name: Run Playwright tests
        working-directory: e2e
        env:
          CI: "true"
        run: |
          set -o pipefail
          npx playwright test 2>&1 | tee /tmp/diag/playwright.log

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: playwright-traces
          path: e2e/test-results
          retention-days: 7
          if-no-files-found: ignore

      - name: Post diagnostics on failure
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## CI \`e2e\` job failed (commit \`${{ github.sha }}\`)"
            echo
            echo "Failed tests + first 50 lines of log:"
            echo
            echo '```'
            grep -E "^\s*[0-9]+\) " /tmp/diag/playwright.log | head -20 || true
            echo '```'
            echo
            for f in /tmp/diag/*.log; do
              echo "<details><summary>$(basename "$f") — last 50 KB</summary>"
              echo
              echo '```'
              tail -c 50000 "$f"
              echo '```'
              echo "</details>"
              echo
            done
          } > /tmp/diag/comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            -F /tmp/diag/comment.md

  deploy:
    name: Deploy to Cloudflare Pages
    needs: [bundle, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download dist artifact
        uses: actions/download-artifact@v4.1.8
        with:
          name: dist
          path: dist/public

      # Wrangler 3.x `pages deploy` does not auto-create the project,
      # so we ensure it exists first. `continue-on-error: true` makes
      # this idempotent: the call fails harmlessly if the project is
      # already there, and any auth/scope issues will resurface in the
      # subsequent deploy step.
      - name: Ensure Pages project exists
        uses: cloudflare/wrangler-action@v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create betu-tanulas --production-branch main
        continue-on-error: true

      - name: Deploy to Pages
        uses: cloudflare/wrangler-action@v3.14.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/public --project-name=betu-tanulas --branch=main --commit-dirty=true
